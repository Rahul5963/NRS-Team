<!DOCTYPE html>
<html>
<head>
<title>Login - CodeAcademy</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#000428,#004e92);
    display:flex;
    justify-content:center;
    align-items:center; 
    height:100vh;
}

.form-box{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

h2{
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#004e92;
    color:white;
    border:none;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
}

button:hover{
    background:#001f4d;
}
</style>
</head>

<body>

<div class="form-box">
    <h2>Login</h2>
    <form>
        <input type="email" placeholder="Email Address" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
