<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAcademy - Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

/* Header */
header{
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    padding:20px 60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:22px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:15px;
}

nav a:hover{
    color:#00c6ff;
}

/* Hero */
.hero{
    min-height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h2{
    font-size:45px;
    margin-bottom:20px;
}

.hero p{
    font-size:18px;
    margin-bottom:30px;
    max-width:600px;
}

.btn{
    padding:12px 30px;
    background:#00c6ff;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:#0072ff;
}

footer{
    text-align:center;
    padding:20px;
    background:rgba(0,0,0,0.5);
}
</style>
</head>

<header>
    <h1>CodeAcademy</h1>
    <nav>

    <p>Master HTML, CSS, Python & JavaScript with structured premium courses.</p>
    <a href="register.html" class="btn">Get Started</a>
</section>

<footer>

</footer>

</body>
</html>
